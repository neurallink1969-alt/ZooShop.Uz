<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZooShop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg: var(--tg-theme-bg-color, #f5f7f4);
  --panel: var(--tg-theme-secondary-bg-color, #ffffff);
  --ink: var(--tg-theme-text-color, #1e2a22);
  --muted: var(--tg-theme-hint-color, #6b7a70);
  --green:#2e7d4f; --green-d:#1f5c39; --line:#00000014;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--ink);padding-bottom:86px}

.top{position:sticky;top:0;z-index:40;background:var(--bg);padding:10px 12px 8px}
.top input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:var(--panel);color:var(--ink)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:8px 0 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;background:var(--panel);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink)}
.chip.on{background:var(--green);color:#fff;border-color:var(--green)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.imgbox{aspect-ratio:1;background:#fff;display:flex;align-items:center;justify-content:center;cursor:zoom-in}
.imgbox img{width:100%;height:100%;object-fit:contain}
.imgbox .ph{font-size:38px;opacity:.25}
.cbody{padding:9px 10px 10px;display:flex;flex-direction:column;gap:5px;flex:1}
.brend{font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--green);text-transform:uppercase}
.nomi{font-size:13px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.narx{font-size:15px;font-weight:800;margin-top:auto}
.addbtn{width:100%;padding:9px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.stepper{display:flex;align-items:center;justify-content:space-between;background:var(--green);border-radius:10px;color:#fff}
.stepper button{width:38px;height:36px;border:none;background:none;color:#fff;font-size:20px;font-weight:700;cursor:pointer}
.stepper span{font-size:15px;font-weight:800}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 20px}

/* savatcha paneli */
.cartbar{position:fixed;left:12px;right:12px;bottom:12px;z-index:50;background:var(--green-d);color:#fff;border-radius:14px;padding:13px 16px;display:none;align-items:center;justify-content:space-between;box-shadow:0 8px 24px rgba(0,0,0,.25);cursor:pointer}
.cartbar b{font-size:15px}
.cartbar .cnt{background:#fff;color:var(--green-d);border-radius:20px;padding:2px 10px;font-weight:800;font-size:13px;margin-right:8px}

/* savatcha oynasi */
.sheet{display:none;position:fixed;inset:0;z-index:60;background:rgba(10,16,12,.5)}
.sheet .inner{position:absolute;left:0;right:0;bottom:0;max-height:88vh;background:var(--bg);border-radius:18px 18px 0 0;padding:16px 14px 20px;overflow-y:auto}
.sheet h2{font-size:17px;margin-bottom:12px}
.ci{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 10px;margin-bottom:8px}
.ci .inf{flex:1;min-width:0}
.ci .n{font-size:12.5px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci .p{font-size:13px;font-weight:800;margin-top:3px}
.ci .st{display:flex;align-items:center;gap:2px;background:var(--green);border-radius:9px;color:#fff}
.ci .st button{width:30px;height:30px;border:none;background:none;color:#fff;font-size:17px;font-weight:700}
.ci .st span{min-width:22px;text-align:center;font-size:13px;font-weight:800}
.tot{display:flex;justify-content:space-between;font-size:16px;font-weight:800;padding:12px 4px}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
.fld input,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--panel);color:var(--ink)}
.send{width:100%;padding:14px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:15px;font-weight:800;margin-top:6px}
.hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px}

/* rasm lightbox */
#lb{display:none;position:fixed;inset:0;z-index:70;background:rgba(10,16,12,.9);align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:20px}
#lb img{max-width:94vw;max-height:78vh;object-fit:contain;background:#fff;border-radius:12px}
#lb .cap{color:#fff;font-size:14px;text-align:center}
</style>
</head>
<body>

<div class="top">
  <input type="search" id="q" placeholder="Qidiruv: nomi, brend..." oninput="render()">
  <div class="chips" id="chips"></div>
</div>

<div class="grid" id="grid"></div>

<div class="cartbar" id="cartbar" onclick="openCart()">
  <span><span class="cnt" id="cCnt">0</span> Savatcha</span>
  <b id="cSum">0 so'm</b>
</div>

<div class="sheet" id="sheet" onclick="if(event.target===this)closeCart()">
  <div class="inner">
    <h2>🛒 Savatcha</h2>
    <div id="cartList"></div>
    <div class="tot"><span>Jami:</span><span id="cTotal">0 so'm</span></div>
    <div class="fld"><label>Telefon raqamingiz *</label><input id="tel" type="tel" placeholder="+998 90 123 45 67"></div>
    <div class="fld"><label>Izoh (ixtiyoriy)</label><textarea id="izoh" rows="2" placeholder="Manzil, yetkazish vaqti..."></textarea></div>
    <button class="send" onclick="sendOrder()">Buyurtma berish</button>
    <div class="hint">Buyurtma botga yuboriladi, tez orada bog'lanamiz</div>
  </div>
</div>

<div id="lb" onclick="this.style.display='none'">
  <img id="lbImg" src="" alt="">
  <div class="cap" id="lbCap"></div>
</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();

let items = [], cart = {}, activeTuri = '';

fetch('products.json?v=' + Date.now())
  .then(r => r.json())
  .then(d => {
    const arr = Array.isArray(d) ? d : d.items;
    items = (arr || []).filter(i => i.nomi && +i.narx > 0);
    buildChips(); render();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div class="empty">Katalogni yuklab bo\'lmadi. Keyinroq urinib ko\'ring.</div>';
  });

function fmt(n){ return Number(n).toLocaleString('ru-RU') + " so'm"; }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function buildChips(){
  const turis = [...new Set(items.map(i=>i.turi).filter(Boolean))].sort();
  const box = document.getElementById('chips');
  box.innerHTML = `<button class="chip on" data-t="">Hammasi</button>` +
    turis.map(t=>`<button class="chip" data-t="${esc(t)}">${esc(t)}</button>`).join('');
  box.querySelectorAll('.chip').forEach(b=>b.onclick = ()=>{
    activeTuri = b.dataset.t;
    box.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on', x===b));
    render();
  });
}

function render(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  let list = items.filter(i => !activeTuri || i.turi === activeTuri);
  if(q){
    const words = q.split(/\s+/).filter(Boolean);
    list = list.filter(i=>{
      const hay = [i.nomi, i.brend, i.plu].map(v=>String(v??'').toLowerCase());
      return words.every(w=>hay.some(v=>v.includes(w)));
    });
  }
  const g = document.getElementById('grid');
  if(!list.length){ g.innerHTML = '<div class="empty">Mahsulot topilmadi</div>'; return; }
  g.innerHTML = list.slice(0, 400).map(i=>{
    const qty = cart[i.plu] || 0;
    return `<div class="card">
      <div class="imgbox" onclick="showImg('${esc(i.plu)}')">${i.rasm ? `<img src="${esc(i.rasm)}" loading="lazy">` : '<span class="ph">🐾</span>'}</div>
      <div class="cbody">
        <div class="brend">${esc(i.brend||'&nbsp;')}</div>
        <div class="nomi">${esc(i.nomi)}</div>
        <div class="narx">${fmt(i.narx)}</div>
        ${qty ? stepper(i.plu, qty) : `<button class="addbtn" onclick="add('${esc(i.plu)}',1)">Savatga</button>`}
      </div>
    </div>`;
  }).join('');
  updateBar();
}
function stepper(plu, qty){
  return `<div class="stepper">
    <button onclick="add('${esc(plu)}',-1)">−</button><span>${qty}</span>
    <button onclick="add('${esc(plu)}',1)">＋</button></div>`;
}
function add(plu, d){
  cart[plu] = (cart[plu]||0) + d;
  if(cart[plu] <= 0) delete cart[plu];
  tg?.HapticFeedback?.impactOccurred('light');
  render();
  if(document.getElementById('sheet').style.display==='block') drawCart();
}
function cartTotal(){
  let n=0, s=0;
  for(const plu in cart){
    const i = items.find(x=>String(x.plu)===String(plu));
    if(i){ n += cart[plu]; s += cart[plu]*i.narx; }
  }
  return [n,s];
}
function updateBar(){
  const [n,s] = cartTotal();
  const bar = document.getElementById('cartbar');
  bar.style.display = n ? 'flex' : 'none';
  document.getElementById('cCnt').textContent = n;
  document.getElementById('cSum').textContent = fmt(s);
}
function openCart(){ drawCart(); document.getElementById('sheet').style.display='block'; }
function closeCart(){ document.getElementById('sheet').style.display='none'; }
function drawCart(){
  const box = document.getElementById('cartList');
  const rows = [];
  for(const plu in cart){
    const i = items.find(x=>String(x.plu)===String(plu));
    if(!i) continue;
    rows.push(`<div class="ci">
      <div class="inf"><div class="n">${esc(i.nomi)}</div>
      <div class="p">${fmt(i.narx * cart[plu])}</div></div>
      ${'<div class="st"><button onclick="add(\''+esc(plu)+'\',-1)">−</button><span>'+cart[plu]+'</span><button onclick="add(\''+esc(plu)+'\',1)">＋</button></div>'}
    </div>`);
  }
  box.innerHTML = rows.join('') || '<div class="empty">Savatcha bo\'sh</div>';
  document.getElementById('cTotal').textContent = fmt(cartTotal()[1]);
  if(!rows.length) closeCart();
}
function showImg(plu){
  const i = items.find(x=>String(x.plu)===String(plu));
  if(!i || !i.rasm) return;
  document.getElementById('lbImg').src = i.rasm;
  document.getElementById('lbCap').textContent = i.nomi;
  document.getElementById('lb').style.display = 'flex';
}
function sendOrder(){
  const tel = document.getElementById('tel').value.trim();
  if(!tel){ alert("Telefon raqamingizni kiriting"); return; }
  const t = Object.entries(cart).map(([plu,qty])=>[plu, qty]);
  if(!t.length){ alert("Savatcha bo'sh"); return; }
  const payload = JSON.stringify({ t, tel, izoh: document.getElementById('izoh').value.trim().slice(0,200) });
  if(payload.length > 3800){
    alert("Savatcha juda katta — bir buyurtmada kamroq turdagi mahsulot tanlang.");
    return;
  }
  if(tg?.sendData){ tg.sendData(payload); }
  else alert("Bu sahifa Telegram ichida, bot tugmasi orqali ochilishi kerak.");
}
</script>
</body>
</html>
